<section class="resume-section min-height p-3 p-lg-5 d-flex flex-column" id="education">
  <div class="my-auto" id="education-content">
    <h2 class="mb-5">Education</h2>
    {{ range hugo.Data.education }}
        <div class="resume-item d-flex flex-column flex-md-row mb-5">
          <div class="resume-content mr-auto">
            <h3 class="mb-0">{{ .school | markdownify }}</h3>
            <div class="subheading mb-3">{{ .major | markdownify }} - {{ .degree | markdownify }}</div>
            <p class="mb-0">{{ .notes | markdownify }}</p>
          </div>
          <div class="resume-date text-md-right">
            <span class="text-primary">{{ .range }}</span>
          </div>
        </div>
    {{ end }}
  </div>
</section>
